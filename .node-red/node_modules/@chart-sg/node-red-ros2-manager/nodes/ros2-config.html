<script type="text/javascript">
    RED.nodes.registerType('ros2-config', {
        category: 'config',
        color: '#87CEEB',
        defaults: {
            name: {value: ""},
            domain: {value: 0, required: true, validate: function(v) {
                const domain = parseInt(v);
                return !isNaN(domain) && domain >= 0 && domain <= 232;
            }},
            namespace: {value: ""}
        },
        label: function() {
            const domain = parseInt(this.domain) || 0;
            return this.name || "ROS2 Config (Domain: " + domain + ")";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        oneditprepare: function() {
            // Initialize form fields with current values
            $("#node-input-name").val(this.name || "");
            $("#node-input-domain").val(this.domain || 0);
            $("#node-input-namespace").val(this.namespace || "");
            
            // Add domain validation
            $("#node-input-domain").on('change', function() {
                validateDomain();
            });
            
            // Add namespace formatting
            $("#node-input-namespace").on('change', function() {
                formatNamespace();
            });
            
            // Initial validation
            validateDomain();
            formatNamespace();
            
            // Show effective configuration
            updateEffectiveConfig();
        },
        oneditsave: function() {
            // Ensure domain is saved as a number
            this.domain = parseInt($("#node-input-domain").val()) || 0;
            // Ensure namespace is saved as a string
            this.namespace = $("#node-input-namespace").val().trim();
        },
        oneditcancel: function() {
            // Restore original values - no changes needed as Node-RED handles this
        }
    });
    
    function validateDomain() {
        const domain = parseInt($("#node-input-domain").val());
        const domainStatus = $("#domain-status");
        
        if (isNaN(domain) || domain < 0 || domain > 232) {
            domainStatus.html(`
                <div class="form-tips" style="background: #ffebee; color: #c62828;">
                    ⚠️ <strong>Invalid domain:</strong> Must be between 0-232
                </div>
            `).show();
        } else {
            // Check for other ros2-config nodes with different domains
            let conflictFound = false;
            RED.nodes.eachConfig(function(config) {
                if (config.type === 'ros2-config' && config.id !== RED.editor.editConfig.id) {
                    if (parseInt(config.domain) !== domain) {
                        conflictFound = true;
                        domainStatus.html(`
                            <div class="form-tips" style="background: #fff3cd; color: #856404;">
                                ⚠️ <strong>Domain conflict:</strong> Another ROS2 Config uses domain ${config.domain}. 
                                SharedManager requires all configurations to use the same domain.
                            </div>
                        `).show();
                    }
                }
            });
            
            if (!conflictFound) {
                domainStatus.html(`
                    <div class="form-tips" style="background: #d4edda; color: #155724;">
                        ✅ <strong>Domain valid:</strong> ${domain} (${getDomainDescription(domain)})
                    </div>
                `).show();
            }
        }
    }
    
    function formatNamespace() {
        const namespace = $("#node-input-namespace").val().trim();
        const namespaceStatus = $("#namespace-status");
        
        if (namespace === "") {
            namespaceStatus.html(`
                <div class="form-tips" style="background: #e3f2fd; color: #1565c0;">
                    ℹ️ <strong>No namespace:</strong> All topics/services/actions will use absolute names
                </div>
            `).show();
        } else if (!namespace.startsWith("/")) {
            namespaceStatus.html(`
                <div class="form-tips" style="background: #fff3cd; color: #856404;">
                    ⚠️ <strong>Namespace format:</strong> Should start with "/" (e.g., "/robot1")
                </div>
            `).show();
        } else {
            namespaceStatus.html(`
                <div class="form-tips" style="background: #d4edda; color: #155724;">
                    ✅ <strong>Namespace:</strong> ${namespace} 
                    <br>Example: topic "/cmd_vel" → "${namespace}/cmd_vel"
                </div>
            `).show();
        }
    }
    
    function getDomainDescription(domain) {
        const descriptions = {
            0: "default domain",
            1: "testing domain",
            69: "common RMF domain",
            100: "simulation domain"
        };
        return descriptions[domain] || "custom domain";
    }
    
    function updateEffectiveConfig() {
        // This could be expanded to show the effective configuration
        // that will be used by SharedManager
    }
</script>

<script type="text/html" data-template-name="ros2-config">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="ROS2 Configuration">
    </div>
    
    <div class="form-row">
        <div class="form-tips" style="background: #e3f2fd; padding: 8px; border-radius: 4px; margin-bottom: 10px;">
            <strong>🌐 Global ROS2 Configuration</strong><br>
            This configuration applies to ALL ROS2 operations in this Node-RED instance,
            including nodes from both node-red-ros2 and node-red-rmf packages.
        </div>
    </div>
    
    <div class="form-row">
        <label for="node-input-domain"><i class="fa fa-globe"></i> Domain ID</label>
        <input type="number" id="node-input-domain" min="0" max="232" placeholder="0">
        <div id="domain-status" style="margin-top: 5px;"></div>
    </div>
    
    <div class="form-row">
        <label for="node-input-namespace"><i class="fa fa-sitemap"></i> Namespace</label>
        <input type="text" id="node-input-namespace" placeholder="/robot1">
        <div id="namespace-status" style="margin-top: 5px;"></div>
    </div>
    
    <div class="form-row">
        <div class="form-tips">
            <strong>Usage:</strong> All ROS2 and RMF nodes will reference this configuration.
            Only one ROS2 Config should exist per Node-RED instance to prevent conflicts.
        </div>
    </div>
</script>

<script type="text/html" data-help-name="ros2-config">
    <p>Global ROS2 configuration node that provides domain and namespace settings for all ROS2 operations.</p>
    
    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Domain ID <span class="property-type">number</span></dt>
        <dd>ROS2 domain identifier (0-232). All ROS2 nodes will operate on this domain.</dd>
        
        <dt>Namespace <span class="property-type">string</span></dt>
        <dd>Optional namespace prefix for all topics, services, and actions. Useful for multi-robot setups.</dd>
    </dl>
    
    <h3>Details</h3>
    <p>This configuration node is used by the SharedManager to ensure all ROS2 operations use consistent settings.</p>
    
    <p><strong>Domain ID:</strong> Must be between 0-232. Common values:
    <ul>
        <li>0: Default domain</li>
        <li>69: Common RMF domain</li>
        <li>1-99: Testing/development domains</li>
    </ul>
    </p>
    
    <p><strong>Namespace:</strong> If specified, will be prepended to all topic/service/action names:
    <ul>
        <li>Empty: "/cmd_vel" remains "/cmd_vel"</li>
        <li>"/robot1": "/cmd_vel" becomes "/robot1/cmd_vel"</li>
    </ul>
    </p>
    
    <p><strong>Important:</strong> Only create one ROS2 Config per Node-RED instance. Multiple configurations with different domains will cause conflicts.</p>
</script>
