# Démarrage simple de la plateforme UR3e.
#
#   docker compose up        -> construit l'image (première fois) et démarre tout
#   puis ouvrir http://localhost:1880/dashboard dans un navigateur
#
services:
  ur3e-platform:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ur3e-platform
    container_name: ur3e-platform

    # Réseau de l'hôte : rend l'interface accessible sur localhost et permet la
    # communication ROS 2 / la connexion au robot réel sur le réseau local.
    # (Linux uniquement.)
    network_mode: host

    # Ordonnancement temps réel : requis par ros2_control (controller_manager)
    # pour piloter le robot de façon stable, en simulation comme en réel.
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      memlock: -1

    environment:
      # Profil lancé au démarrage — CHOISIR ICI ce qui démarre :
      #   "NodeRed seul"      -> interface seule (défaut, aucun matériel requis)
      #   "Robot seul"        -> interface + bras UR3e (commande articulaire/cartésienne)
      #   "Commande en force" -> interface + bras UR3e + commande en effort
      #   "RealSense"         -> interface + caméra Intel RealSense + flux vidéo
      #   "Astra2"            -> interface + caméra Orbbec Astra2 + flux vidéo
      #   "Tout"              -> l'ensemble (bras + caméras)
      # Modifiable sans éditer ce fichier :  PROFILE="Tout" docker compose up
      PROFILE: "${PROFILE:-NodeRed seul}"
      # true = robot simulé (aucun matériel requis) ; false = robot réel
      USE_MOCK: "${USE_MOCK:-true}"
      # Adresse IP du robot réel (utilisée seulement si USE_MOCK=false)
      ROBOT_IP: "${ROBOT_IP:-0.0.0.0}"
      # true = ouvrir la fenêtre RViz (MoveIt) avec les profils bras/force.
      # Nécessite l'affichage X11 partagé ci-dessous. Mettre "false" sur une
      # machine sans écran. Avant le premier lancement, autoriser l'affichage :
      #   xhost +local:
      LAUNCH_RVIZ: "${LAUNCH_RVIZ:-true}"
      DISPLAY: "${DISPLAY:-:0}"
      XAUTHORITY: "/tmp/.Xauthority"
      QT_X11_NO_MITSHM: "1"

    # Enregistrements rosbag conservés sur l'hôte + affichage X11 pour RViz :
    #  - le socket X du serveur graphique
    #  - le cookie d'autorisation X11 (variable XAUTHORITY de l'hôte). Si elle
    #    n'est pas définie, /dev/null est monté et RViz ne s'ouvrira pas (mettre
    #    alors LAUNCH_RVIZ=false, ou installer xhost puis `xhost +local:`).
    volumes:
      - ./bags:/app/bags
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - "${XAUTHORITY:-/dev/null}:/tmp/.Xauthority:ro"

    # Décommenter pour utiliser une caméra USB (RealSense / Orbbec) :
    # privileged: true
    # volumes:
    #   - /dev:/dev

    restart: unless-stopped
